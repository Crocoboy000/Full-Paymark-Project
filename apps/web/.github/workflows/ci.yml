name: CI
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - name: Build (apps/web)
        working-directory: apps/web
        run: pnpm build
