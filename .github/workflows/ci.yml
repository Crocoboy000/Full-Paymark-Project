
name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (turbo)
        run: pnpm exec turbo lint --filter=paymark

      - name: Type check
        working-directory: ./apps/web
        run: pnpm exec tsc --noEmit

      - name: Build (turbo)
        run: pnpm exec turbo build --filter=paymark
